syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.github.nicheapplab.tcodeserver";
option java_outer_classname = "TCodeServerProto";

service TCodeService {
  rpc Put(PutRequest) returns (BufferStatusResponse) {};
  rpc Left(InflexLeftRequest) returns (BufferStatusResponse) {};
  rpc Right(InflexRightRequest) returns (BufferStatusResponse) {};
  rpc Reset(ResetRequest) returns (BufferStatusResponse) {};
  rpc Convert(ConvertRequest) returns (BufferStatusResponse) {};
  rpc Select(SelectCandidateRequest) returns (BufferStatusResponse) {};
  rpc Commit(CommitRequest) returns (CommitResponse) {};
  rpc Backspace(BackspaceRequest) returns (BufferStatusResponse) {};
}

message PutRequest {
  string char = 1;
}

message BufferStatusResponse {
  string outputBuffer = 1;
  string buffer = 2;
  repeated string candidates = 3;
  string lastCharAsKey = 4;
  bool commandSucceed = 5;
}

message InflexLeftRequest {}

message InflexRightRequest {}

message ResetRequest {}

message ConvertRequest {}

message SelectCandidateRequest {
  int32 n = 1;
}

message CommitRequest {}

message CommitResponse {
  string output = 1;
}

message BackspaceRequest {}
